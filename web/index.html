<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0">
    <title>My Agent</title>
    <link rel="stylesheet" href="/static/style.css">
    <!-- Marked.js for markdown rendering -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- DOMPurify for HTML sanitization -->
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
</head>
<body>
    <div id="app">
        <!-- Mobile overlay -->
        <div id="sidebar-overlay" onclick="toggleSidebar()"></div>

        <!-- Sidebar -->
        <aside id="sidebar">
            <div class="sidebar-header">
                <h2>💬 My Agent</h2>
                <button id="new-chat-btn" onclick="newChat()">+ New Chat</button>
            </div>

            <!-- User info -->
            <div id="user-info" style="padding:10px 20px;font-size:13px;color:var(--text-secondary);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;"></div>

            <!-- Repos -->
            <div class="skills-section">
                <h3>📦 仓库</h3>
                <div id="repos-list"></div>
            </div>

            <!-- Skills -->
            <div class="skills-section">
                <h3>🛠 Skills</h3>
                <div id="skills-list"></div>
            </div>

            <!-- Sessions -->
            <div class="sessions-section">
                <h3>📝 History</h3>
                <div id="sessions-list"></div>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main id="chat-area">
            <!-- Mobile header -->
            <div id="mobile-header">
                <button id="menu-btn" onclick="toggleSidebar()" aria-label="Toggle menu">☰</button>
                <span class="mobile-title">💬 My Agent</span>
            </div>

            <div id="messages">
                <div class="welcome-message">
                    <h1>👋 Hello!</h1>
                    <p>Select a skill and start chatting.</p>
                    <p>Your agent supports tool-use and will think step by step.</p>
                </div>
            </div>

            <!-- Input Area -->
            <div id="input-area">
                <div class="input-wrapper">
                    <textarea
                        id="message-input"
                        placeholder="Type your message... (Enter to send, Shift+Enter for new line)"
                        rows="1"
                        onkeydown="handleKeyDown(event)"
                        oninput="autoResize(this)"
                    ></textarea>
                    <button id="send-btn" onclick="sendMessage()">Send</button>
                </div>
            </div>
        </main>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
