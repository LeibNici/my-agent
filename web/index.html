<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0">
    <title>My Agent</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700;800&family=Public+Sans:wght@400;500;600;700&family=Source+Serif+4:ital,wght@1,400;1,500&display=swap">
    <link rel="stylesheet" href="/static/style.css">
    <!-- Marked.js for markdown rendering (pinned version + SRI) -->
    <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"
            integrity="sha384-/TQbtLCAerC3jgaim+N78RZSDYV7ryeoBCVqTuzRrFec2akfBkHS7ACQ3PQhvMVi"
            crossorigin="anonymous"></script>
    <!-- DOMPurify for HTML sanitization (pinned version + SRI) -->
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"
            integrity="sha384-+VfUPEb0PdtChMwmBcBmykRMDd+v6D/oFmB3rZM/puCMDYcIvF968OimRh4KQY9a"
            crossorigin="anonymous"></script>
</head>
<body>
    <div id="app">
        <!-- Mobile overlay -->
        <div id="sidebar-overlay" onclick="toggleSidebar()"></div>

        <!-- Sidebar -->
        <aside id="sidebar">
            <div class="sidebar-header">
                <h2>my_agent</h2>
                <button id="new-chat-btn" onclick="newChat()">+ New Chat</button>
            </div>

            <!-- Repos: workspace picker -->
            <div class="workspace-section">
                <h3>Workspace</h3>
                <div id="repos-list"></div>
            </div>

            <!-- Skills: mode toggles -->
            <div class="skills-section">
                <h3>Skills</h3>
                <div id="skills-list"></div>
            </div>

            <!-- Sessions -->
            <div class="sessions-section">
                <h3>History</h3>
                <div id="sessions-list"></div>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main id="chat-area">
            <!-- Mobile header -->
            <div id="mobile-header">
                <button id="menu-btn" onclick="toggleSidebar()" aria-label="Toggle menu">☰</button>
                <span class="mobile-title">my_agent</span>
            </div>

            <div id="messages">
                <div class="welcome-message">
                    <div class="welcome-eyebrow">my_agent · code-aware chat</div>
                    <h1>从这里开始</h1>
                    <p>选择左侧仓库和技能，或直接描述你要做的事。</p>
                    <div class="welcome-examples">
                        <button class="example-chip" onclick="fillExample(this)">这段代码逻辑是什么？帮我逐步讲解</button>
                        <button class="example-chip" onclick="fillExample(this)">确认一下这个 bug 是否真的存在</button>
                        <button class="example-chip" onclick="fillExample(this)">帮我起草一个 GitHub issue</button>
                    </div>
                </div>
            </div>

            <!-- Input Area -->
            <div id="input-area">
                <div id="chat-notice"></div>
                <div id="image-preview-strip"></div>
                <div class="input-wrapper">
                    <button id="attach-btn" onclick="document.getElementById('image-file-input').click()" title="Attach image" aria-label="Attach image">+</button>
                    <input type="file" id="image-file-input" accept="image/jpeg,image/png,image/gif,image/webp" multiple style="display:none" onchange="handleImageFilesSelected(this.files)">
                    <textarea
                        id="message-input"
                        placeholder="Type your message... (Enter to send, Shift+Enter for new line, paste or attach an image)"
                        rows="1"
                        onkeydown="handleKeyDown(event)"
                        oninput="autoResize(this)"
                        onpaste="handlePaste(event)"
                    ></textarea>
                    <button id="send-btn" onclick="sendMessage()">Send</button>
                </div>
            </div>
        </main>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
