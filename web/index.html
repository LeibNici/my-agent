<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0">
    <title>CodeAxis</title>
    <!-- Applied before first paint so an explicit theme choice (localStorage,
         set by shared.js's toggle) never flashes the wrong theme on load. -->
    <script>(function(){var t=localStorage.getItem("theme");if(t==="light"||t==="dark")document.documentElement.setAttribute("data-theme",t);})();</script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700;800&family=Public+Sans:wght@400;500;600;700&family=Source+Serif+4:ital,wght@1,400;1,500&display=swap">
    <link rel="stylesheet" href="/static/style.css">
    <!-- Marked.js for markdown rendering (pinned version + SRI) -->
    <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"
            integrity="sha384-/TQbtLCAerC3jgaim+N78RZSDYV7ryeoBCVqTuzRrFec2akfBkHS7ACQ3PQhvMVi"
            crossorigin="anonymous"></script>
    <!-- DOMPurify for HTML sanitization (pinned version + SRI) -->
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"
            integrity="sha384-+VfUPEb0PdtChMwmBcBmykRMDd+v6D/oFmB3rZM/puCMDYcIvF968OimRh4KQY9a"
            crossorigin="anonymous"></script>
    <!-- highlight.js for code syntax highlighting (pinned version + SRI; theme colors live in style.css) -->
    <script src="https://cdn.jsdelivr.net/npm/@highlightjs/cdn-assets@11.9.0/highlight.min.js"
            integrity="sha384-F/bZzf7p3Joyp5psL90p/p89AZJsndkSoGwRpXcZhleCWhd8SnRuoYo4d0yirjJp"
            crossorigin="anonymous"></script>
</head>
<body>
    <div id="app">
        <!-- Mobile overlay -->
        <div id="sidebar-overlay" onclick="toggleSidebar()"></div>

        <!-- Sidebar -->
        <aside id="sidebar">
            <div class="sidebar-header">
                <h2>CodeAxis</h2>
                <button id="new-chat-btn" onclick="newChat()">+ 新建会话</button>
            </div>

            <!-- Repos: workspace picker -->
            <div class="workspace-section">
                <h3>Workspace</h3>
                <div id="repos-list"></div>
            </div>

            <!-- Skills: mode toggles -->
            <div class="skills-section">
                <h3>Skills</h3>
                <div id="skills-list"></div>
            </div>

            <!-- My filed issues: entry to the tracking drawer -->
            <button id="my-issues-btn" onclick="openMyIssues()">
                <span>我的提报</span>
                <span id="my-issues-badge" hidden></span>
            </button>

            <!-- Sessions -->
            <div class="sessions-section">
                <h3>History</h3>
                <input id="session-search" type="search" placeholder="搜索会话标题 / ID…" oninput="filterSessions()" autocomplete="off">
                <div id="sessions-list"></div>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main id="chat-area">
            <!-- Mobile header -->
            <div id="mobile-header">
                <button id="menu-btn" onclick="toggleSidebar()" aria-label="Toggle menu">☰</button>
                <span class="mobile-title">CodeAxis</span>
            </div>

            <div id="messages">
                <div class="welcome-message">
                    <div class="welcome-eyebrow">CodeAxis · code-aware chat</div>
                    <h1>从这里开始</h1>
                    <p>选择左侧仓库和技能，或直接描述你要做的事。</p>
                    <div class="welcome-examples">
                        <button class="example-chip" onclick="fillExample(this)">这段代码逻辑是什么？帮我逐步讲解</button>
                        <button class="example-chip" onclick="fillExample(this)">确认一下这个 bug 是否真的存在</button>
                        <button class="example-chip" onclick="fillExample(this)">帮我起草一个 GitHub issue</button>
                    </div>
                </div>
            </div>

            <!-- Input Area -->
            <div id="input-area">
                <div id="chat-notice"></div>
                <div id="image-preview-strip"></div>
                <div class="input-wrapper">
                    <button id="attach-btn" onclick="document.getElementById('image-file-input').click()" title="添加截图" aria-label="添加截图">+</button>
                    <input type="file" id="image-file-input" accept="image/jpeg,image/png,image/gif,image/webp" multiple style="display:none" onchange="handleImageFilesSelected(this.files)">
                    <textarea
                        id="message-input"
                        placeholder="描述问题，或直接粘贴系统截图…"
                        rows="1"
                        onkeydown="handleKeyDown(event)"
                        oninput="autoResize(this)"
                        onpaste="handlePaste(event)"
                    ></textarea>
                    <button id="send-btn" onclick="sendMessage()">发送</button>
                </div>
                <div class="input-hint"><kbd>Enter</kbd> 发送 · <kbd>Shift+Enter</kbd> 换行 · 支持粘贴/拖入截图</div>

            <!-- Read-only code viewer, opened by clicking a file:line reference -->
            <div id="code-viewer" hidden>
                <div class="cv-header">
                    <span class="cv-eyebrow">READ-ONLY</span>
                    <span class="cv-title"></span>
                    <button class="cv-close" onclick="closeCodeViewer()" title="关闭 (Esc)" aria-label="关闭代码查看器">×</button>
                </div>
                <div class="cv-scroll">
                    <div class="cv-hl"></div>
                    <div class="cv-gutter"></div>
                    <pre class="cv-pre"><code></code></pre>
                </div>
            </div>
            </div>
        </main>
    </div>

    <!-- My filed issues drawer -->
    <div id="my-issues-overlay" hidden onclick="closeMyIssues()"></div>
    <aside id="my-issues-drawer" hidden aria-label="我的提报">
        <div class="mi-header">
            <span class="mi-eyebrow">ISSUE TRACKING</span>
            <h2>我的提报</h2>
            <button class="mi-close" onclick="closeMyIssues()" title="关闭 (Esc)" aria-label="关闭">×</button>
        </div>
        <div class="mi-hint">状态每 10 分钟自动同步；「可验证」表示修复已合入 test 分支，可到测试环境复验。</div>
        <div id="my-issues-list"></div>
    </aside>

    <script src="/static/shared.js"></script>
    <script src="/static/app.js"></script>
</body>
</html>
