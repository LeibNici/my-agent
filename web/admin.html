<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Admin — My Agent</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .admin-layout { display: flex; flex-direction: column; height: 100vh; height: 100dvh; }
        .admin-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 24px; background: var(--bg-secondary); border-bottom: 1px solid var(--border); }
        .admin-header h1 { font-size: 18px; }
        .admin-nav { display: flex; gap: 4px; background: var(--bg-secondary); padding: 0 24px; border-bottom: 1px solid var(--border); }
        .tab-btn { padding: 12px 20px; background: none; border: none; color: var(--text-secondary); font-size: 14px; cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.2s; }
        .tab-btn:hover { color: var(--text-primary); }
        .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
        .admin-content { flex: 1; overflow-y: auto; padding: 24px; }
        .panel { display: none; }
        .panel.active { display: block; }
        .card { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 16px; }
        .card h3 { margin-bottom: 16px; font-size: 16px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 10px 14px; border-bottom: 1px solid var(--border); font-size: 14px; }
        th { color: var(--text-secondary); font-weight: 500; font-size: 12px; text-transform: uppercase; }
        .form-row { display: flex; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; }
        .form-row input, .form-row select { padding: 10px 12px; background: var(--bg-primary); border: 1px solid var(--border); border-radius: 8px; color: var(--text-primary); font-size: 14px; outline: none; }
        .form-row input:focus, .form-row select:focus { border-color: var(--accent); }
        .btn { padding: 10px 18px; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; transition: all 0.2s; }
        .btn-primary { background: var(--accent); color: white; }
        .btn-primary:hover { background: var(--accent-hover); }
        .btn-danger { background: var(--error); color: white; }
        .btn-sm { padding: 6px 12px; font-size: 12px; }
        .badge { display: inline-block; padding: 3px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
        .badge-admin { background: var(--accent); color: white; }
        .badge-user { background: var(--bg-tertiary); color: var(--text-secondary); }
        .badge-read { background: #2a4a3a; color: #4ecdc4; }
        .badge-write { background: #4a3a2a; color: #f0a500; }
        .logout-btn { background: none; border: 1px solid var(--border); color: var(--text-secondary); padding: 8px 14px; border-radius: 8px; cursor: pointer; font-size: 13px; }
        .logout-btn:hover { border-color: var(--error); color: var(--error); }
        .msg { padding: 10px; border-radius: 8px; margin-bottom: 12px; font-size: 13px; }
        .msg-ok { background: #1a3a2a; color: #4ecdc4; }
        .msg-err { background: #3a1a1a; color: #ff6b6b; }
    </style>
</head>
<body>
    <div class="admin-layout">
        <div class="admin-header">
            <h1>⚙️ 管理后台</h1>
            <div style="display:flex;gap:12px;align-items:center;">
                <span id="admin-user" style="font-size:13px;color:var(--text-secondary)"></span>
                <button class="logout-btn" onclick="logout()">退出</button>
            </div>
        </div>
        <div class="admin-nav">
            <button class="tab-btn active" onclick="switchTab('users', this)">👥 用户管理</button>
            <button class="tab-btn" onclick="switchTab('repos', this)">📦 仓库管理</button>
            <button class="tab-btn" onclick="switchTab('perms', this)">🔑 权限分配</button>
        </div>
        <div class="admin-content">
            <div id="msg-area"></div>

            <!-- Users Panel -->
            <div id="panel-users" class="panel active">
                <div class="card">
                    <h3>创建用户</h3>
                    <div class="form-row">
                        <input id="new-username" placeholder="用户名" style="flex:1;min-width:120px;">
                        <input id="new-password" type="password" placeholder="密码" style="flex:1;min-width:120px;">
                        <select id="new-role"><option value="user">普通用户</option><option value="admin">管理员</option></select>
                        <button class="btn btn-primary" onclick="createUser()">创建</button>
                    </div>
                </div>
                <div class="card">
                    <h3>用户列表</h3>
                    <table><thead><tr><th>ID</th><th>用户名</th><th>角色</th><th>状态</th><th>创建时间</th><th>操作</th></tr></thead>
                    <tbody id="users-table"></tbody></table>
                </div>
            </div>

            <!-- Repos Panel -->
            <div id="panel-repos" class="panel">
                <div class="card">
                    <h3>添加仓库</h3>
                    <div class="form-row">
                        <input id="new-repo-name" placeholder="仓库名称" style="flex:1;min-width:120px;">
                        <input id="new-repo-url" placeholder="Git URL" style="flex:2;min-width:200px;">
                        <input id="new-repo-desc" placeholder="描述（可选）" style="flex:1;min-width:120px;">
                        <button class="btn btn-primary" onclick="createRepo()">添加</button>
                    </div>
                </div>
                <div class="card">
                    <h3>仓库列表</h3>
                    <table><thead><tr><th>ID</th><th>名称</th><th>URL</th><th>描述</th><th>操作</th></tr></thead>
                    <tbody id="repos-table"></tbody></table>
                </div>
            </div>

            <!-- Permissions Panel -->
            <div id="panel-perms" class="panel">
                <div class="card">
                    <h3>分配权限</h3>
                    <div class="form-row">
                        <select id="perm-user" style="flex:1;min-width:120px;"><option value="">选择用户</option></select>
                        <select id="perm-repo" style="flex:1;min-width:120px;"><option value="">选择仓库</option></select>
                        <select id="perm-level"><option value="read">只读</option><option value="write">读写</option><option value="admin">管理</option></select>
                        <button class="btn btn-primary" onclick="grantPerm()">授权</button>
                    </div>
                </div>
                <div class="card">
                    <h3>权限列表</h3>
                    <table><thead><tr><th>用户</th><th>仓库</th><th>权限</th><th>操作</th></tr></thead>
                    <tbody id="perms-table"></tbody></table>
                </div>
            </div>
        </div>
    </div>
    <script src="/static/admin.js"></script>
</body>
</html>
