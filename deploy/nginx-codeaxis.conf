# CodeAxis has two hostnames pointed at this box; both proxy to the same
# container (127.0.0.1:18082) and share the same location block, but each
# needs ITS OWN server_name + cert (SNI-matched, no wildcard covers both):
#
# codeaxis.852098505.xyz — the live one. User-owned domain, tunneled in via
# frpc (natfrp) as a raw 443 TCP passthrough straight to this box's nginx —
# frp does NOT terminate TLS itself, so nginx still needs the real cert.
# Cert is user-supplied (DigiCert DV, free-with-domain-registration style,
# valid Jul 12 - Oct 9 2026) — resupply from a fresh
# <order-id>_codeaxis.852098505.xyz_nginx.zip before it expires.
#
# codeaxis.ciiplat.com — no DNS record for this hostname yet (pending:
# whoever manages ciiplat.com's DNS/gateway needs to add one — see engine
# repo history for why xinhaots.ciiplat.com was tried as a workaround and
# abandoned: that hostname's public traffic is routed by an external
# gateway that never reaches this VM at all, confirmed by testing locally
# through this box's own nginx vs. over the public internet). Kept here
# dormant in case that DNS record shows up later.
server {
    listen 443 ssl;
    server_name codeaxis.852098505.xyz;

    ssl_certificate /etc/nginx/ssl/codeaxis.852098505.xyz.pem;
    ssl_certificate_key /etc/nginx/ssl/codeaxis.852098505.xyz.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_timeout 5m;

    # Codex full-repo review (2026-07-14, Warning): no limit here meant
    # nginx's own default (1m) applied — SMALLER than what the backend
    # actually accepts (up to 5 images at 6MB base64 each, see
    # engine/src/server/sse.ts's MAX_IMAGE_BASE64_CHARS/
    # MAX_IMAGES_PER_MESSAGE), so a legitimate multi-image chat message
    # would get rejected by nginx before ever reaching the app. Matches the
    # app's own bodyLimit for /api/chat (app.ts) with headroom.
    client_max_body_size 35m;

    location / {
        proxy_pass http://127.0.0.1:18082;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # SSE (chat streaming): no buffering, no keep-alive interference.
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_read_timeout 300s;
    }
}

server {
    listen 443 ssl;
    server_name codeaxis.ciiplat.com;

    ssl_certificate /etc/nginx/ssl/ciiplat.com.pem;
    ssl_certificate_key /etc/nginx/ssl/ciiplat.com.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_timeout 5m;

    # Codex full-repo review (2026-07-14, Warning): no limit here meant
    # nginx's own default (1m) applied — SMALLER than what the backend
    # actually accepts (up to 5 images at 6MB base64 each, see
    # engine/src/server/sse.ts's MAX_IMAGE_BASE64_CHARS/
    # MAX_IMAGES_PER_MESSAGE), so a legitimate multi-image chat message
    # would get rejected by nginx before ever reaching the app. Matches the
    # app's own bodyLimit for /api/chat (app.ts) with headroom.
    client_max_body_size 35m;

    location / {
        proxy_pass http://127.0.0.1:18082;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
